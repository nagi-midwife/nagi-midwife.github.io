<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>産後ママのメンタルタイプ診断｜なぎ（助産師11年目）</title>
<meta name="description" content="助産師11年目のなぎが臨床経験をもとに作成した、産後ママのメンタルタイプ診断。12問に答えるだけで、今の自分の状態とタイプがわかります。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#fafaf8;color:#1a1a18;min-height:100vh;padding:0 0 60px}
.header{background:#fff;border-bottom:1px solid #e8e6e0;padding:16px 20px;text-align:center}
.header-name{font-size:13px;color:#73726c;margin-bottom:4px}
.header-title{font-size:16px;font-weight:500;color:#1a1a18}
.container{max-width:560px;margin:0 auto;padding:24px 20px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:24px;margin-bottom:16px}
.prog-wrap{margin-bottom:24px}
.prog-bar{height:4px;background:#e8e6e0;border-radius:2px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:#534AB7;border-radius:2px;transition:width .3s}
.prog-label{font-size:11px;color:#73726c;text-align:right}
.step-badge{display:inline-block;font-size:11px;font-weight:500;color:#534AB7;background:#EEEDFE;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.qtext{font-size:16px;font-weight:500;color:#1a1a18;line-height:1.65;margin-bottom:8px}
.qnote{font-size:12px;color:#73726c;margin-bottom:16px;line-height:1.5;padding:8px 12px;background:#fafaf8;border-radius:8px}
.opt-grid{display:grid;gap:8px;margin-bottom:20px}
.opt-btn{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px;font-size:14px;color:#1a1a18;cursor:pointer;text-align:left;transition:all .15s;line-height:1.4;font-family:inherit}
.opt-btn:hover{background:#f5f4f0;border-color:#b4b2a9}
.opt-btn.sel{background:#EEEDFE;border-color:#534AB7;color:#3C3489;font-weight:500}
.nav{display:flex;gap:8px}
.nav-btn{border:1px solid #e8e6e0;border-radius:10px;padding:12px 24px;font-size:14px;color:#73726c;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:#f5f4f0}
.nav-btn.primary{background:#1a1a18;color:#fff;border-color:#1a1a18;flex:1}
.nav-btn.primary:hover{background:#333}
.nav-btn:disabled{opacity:.35;cursor:default}
.res-zone{border-radius:12px;padding:20px;margin-bottom:12px}
.res-zone-title{font-size:20px;font-weight:500;margin-bottom:8px}
.res-zone-desc{font-size:14px;line-height:1.75;color:#444441}
.res-type{border-radius:12px;padding:20px;border:2px solid #CECBF6;margin-bottom:10px;background:#fff}
.res-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#EEEDFE;color:#3C3489;margin-bottom:10px}
.res-sub-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#f5f4f0;color:#73726c;margin-bottom:10px}
.res-name{font-size:17px;font-weight:500;color:#1a1a18;margin-bottom:4px}
.res-core{font-size:13px;color:#73726c;margin-bottom:10px;font-style:italic}
.res-desc{font-size:14px;color:#444441;line-height:1.65;margin-bottom:12px}
.res-divider{border:none;border-top:1px solid #e8e6e0;margin:12px 0}
.al{font-size:11px;font-weight:500;color:#73726c;letter-spacing:.04em;margin-bottom:6px;margin-top:10px;text-transform:uppercase}
.a-stop{font-size:14px;color:#A32D2D;padding:4px 0;line-height:1.5}
.a-go{font-size:14px;color:#0F6E56;padding:4px 0;line-height:1.5}
.alert-box{background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:14px 16px;font-size:14px;color:#791F1F;line-height:1.65;margin-bottom:12px}
.reset-btn{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:12px 24px;font-size:14px;color:#73726c;cursor:pointer;margin-top:16px;font-family:inherit;width:100%;transition:all .15s}
.reset-btn:hover{background:#f5f4f0}
.footer{text-align:center;margin-top:32px;font-size:12px;color:#73726c;line-height:1.8}
.footer a{color:#534AB7;text-decoration:none}
.note-banner{background:#EEEDFE;border-radius:12px;padding:16px 20px;margin-bottom:16px;text-align:center}
.note-banner p{font-size:13px;color:#3C3489;line-height:1.7;margin-bottom:10px}
.note-link{display:inline-block;background:#534AB7;color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;text-decoration:none;transition:background .15s}
.note-link:hover{background:#3C3489}
</style>
</head>
<body>
<div class="header">
  <div class="header-name">なぎ｜産後ママに寄り添う助産師</div>
  <div class="header-title">産後ママのメンタルタイプ診断</div>
</div>
<div class="container">
  <div class="note-banner">
    <p>この診断は、助産師11年の臨床経験をもとに作成しました。<br>詳しい対処法・夫婦関係のすり合わせリストは<br>noteの記事で読めます。</p>
    <a class="note-link" href="https://note.com/" target="_blank">note記事を読む</a>
  </div>
  <div class="card">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <div class="prog-label" id="pl">0 / 12</div>
    </div>
    <div id="quiz"></div>
    <div id="result" style="display:none"></div>
  </div>
  <div class="footer">
    <p>この診断は医学的な診断ツールではありません。<br>気になることがあれば産院・助産師・かかりつけ医にご相談ください。</p>
    <br>
    <p>Threads: <a href="https://www.threads.com/@mamalog3830" target="_blank">@mamalog3830</a></p>
  </div>
</div>
<script>
var Qs=[
  {t:"この1週間、理由もなく涙が出ることがありましたか？",k:"zone",w:[0,1,2]},
  {t:"眠れない夜が続いていますか？（赤ちゃんのお世話以外の理由で）",k:"zone",w:[0,1,2]},
  {t:"「消えてしまいたい」「いなければよかった」と感じたことがありますか？",k:"zone",w:[0,2,4],n:"正直に答えてください。あなたを責める設問ではありません"},
  {t:"育児書や情報通りにいかないと、強く自分を責めますか？",k:"A",w:[0,1,2]},
  {t:"赤ちゃんが寝ている間も家事や育児準備をやめられないことがありますか？",k:"B",w:[0,1,2]},
  {t:"「無理しないで」と家族に言われたことがありますか？",k:"B",w:[0,1,2]},
  {t:"相談できる人が身近にいない、または頼り方がわからないと感じますか？",k:"C",w:[0,1,2]},
  {t:"パートナーの帰りが遅い・実家が遠いなど、一人でいる時間が長いですか？",k:"C",w:[0,1,2]},
  {t:"SNSや周りのママを見て「私だけうまくできていない」と感じることがありますか？",k:"D",w:[0,1,2]},
  {t:"妊娠前の自分（仕事・自由な時間・自分らしさ）を失った感覚がありますか？",k:"E",w:[0,1,2]},
  {t:"赤ちゃんをかわいいと思えない、または何も感じない時間がありますか？",k:"F",w:[0,1,2],n:"感じにくいこと自体が、疲弊のサインである場合があります"},
  {t:"常に緊張が続いていて、赤ちゃんの些細な変化にも強く反応してしまいますか？",k:"G",w:[0,1,2]},
];
var OPTS=["ほとんどない","たまにある","よくある・ずっとある"];
var TY={
  A:{name:"完璧主義型",core:"ちゃんとしなきゃが止まらない",desc:"育児書通りにいかないと自分を責め、もっとできたはずという思考が止まらないタイプ。真面目で責任感が強いからこそ、気づかないうちに産後うつへと近づきやすい。",stop:["毎日の育児日記・体重チェック","もっとできたはずという自己評価"],go:["今日できたこと1つだけ記録する","パートナーに頼む練習を1日1回する"]},
  B:{name:"頑張りすぎ型",core:"限界に自分で気づいていない",desc:"私がやらなきゃという使命感で走り続けるタイプ。周囲が先に限界を察知する。産後1ヶ月を過ぎたあたりでガクッと崩れやすいのがこのタイプの特徴。",stop:["赤ちゃんが寝ている間の家事","後でやろうリストを増やし続けること"],go:["1日1回何もしない15分を予定に入れる","今日しんどかったを声に出す習慣をつける"]},
  C:{name:"孤立・孤独型",core:"誰にも頼れない環境要因が絡む",desc:"パートナーの帰りが遅い、実家が遠い、ママ友がいないなど、環境的な孤立が背景にあるタイプ。性格の問題ではなく状況の問題。",stop:["迷惑をかけたくないという理由で連絡をためらうこと","一人で全部解決しようとすること"],go:["地域の産後ケア施設・助産師外来に一度連絡してみる","オンラインの産後ママコミュニティを探す"]},
  D:{name:"比較・劣等感型",core:"SNS・周囲との比較ループ",desc:"今の産後ママに最も多いタイプ。SNSで完璧な育児を見るたびに私だけうまくできていないと感じ、自己評価が下がっていく。",stop:["育児系SNSアカウントを見続けること","他のママと自分の育児を比較すること"],go:["育児系SNSを1日15分以内にルール化する","うまくいったことを1つだけ夜に書き留める"]},
  E:{name:"喪失感型",core:"以前の自分を失った感覚",desc:"妊娠前の仕事での達成感・自由な時間・自分らしさを失った感覚が強いタイプ。キャリア志向が強かったママや、自己肯定感を仕事に置いていたママに多い。",stop:["以前の自分に戻らなきゃという思考","育児以外の自分を完全に封印すること"],go:["1日5分だけ以前の自分が好きだったことをする","喪失感をパートナーに言葉で伝える"]},
  F:{name:"感情麻痺型",core:"泣けない・愛着がわかない",desc:"泣けない・感動できない・赤ちゃんへの愛着がわかないと感じているタイプ。何も感じないこと自体が、疲弊やうつの入口であるケースが多い。臨床的に最も見落とされやすいタイプです。",stop:["愛情が足りないせいだと自分を責めること","そのうち感じるようになると放置すること"],go:["今の状態を助産師や医師に正直に話す","かわいいと思えないという感覚をパートナーに伝える"]},
  G:{name:"過覚醒・過緊張型",core:"常にアンテナが立っていて休めない",desc:"常に緊張が続いていて眠れない、赤ちゃんの些細な変化に過剰反応してしまうタイプ。トラウマ的な出産体験が背景にある場合もあります。",stop:["いつでも対応できるよう常に準備しておくこと","出産の記憶を何度も反芻すること"],go:["呼吸を意識的に整える時間を1日1回つくる","出産体験について助産師や専門家に話してみる"]},
};
var ans=Array(Qs.length).fill(null);
var cur=0;
function prog(){
  var d=ans.filter(function(a){return a!==null;}).length;
  document.getElementById('pf').style.width=Math.round(d/Qs.length*100)+'%';
  document.getElementById('pl').textContent=d+' / '+Qs.length;
}
function render(){
  var q=Qs[cur];
  var h='<div class="step-badge">'+(cur+1)+' / '+Qs.length+'</div>';
  h+='<div class="qtext">'+q.t+'</div>';
  if(q.n) h+='<div class="qnote">'+q.n+'</div>';
  h+='<div class="opt-grid">';
  OPTS.forEach(function(o,j){
    h+='<button class="opt-btn'+(ans[cur]===j?' sel':'')+'" onclick="pick('+j+')">'+o+'</button>';
  });
  h+='</div>';
  h+='<div class="nav">';
  if(cur>0) h+='<button class="nav-btn" onclick="go(-1)">戻る</button>';
  h+='<button class="nav-btn primary" onclick="go(1)" '+(ans[cur]===null?'disabled':'')+'>'+( cur===Qs.length-1?'結果を見る':'次へ')+'</button>';
  h+='</div>';
  document.getElementById('quiz').innerHTML=h;
  prog();
}
function pick(j){
  ans[cur]=j;render();
  if(cur<Qs.length-1){setTimeout(function(){go(1);},350);}
  else{setTimeout(function(){showResult();},350);}
}
function go(d){var n=cur+d;if(n<0||n>=Qs.length)return;cur=n;render();}
function showResult(){
  var rf=ans[2]>=2;
  var zs=(Qs[0].w[ans[0]]||0)+(Qs[1].w[ans[1]]||0)+(Qs[2].w[ans[2]]||0);
  var zone,zbg,zmsg;
  if(rf||zs>=5){zone='🔴 今すぐ相談してほしいゾーン';zbg='#FCEBEB';zmsg='消えたい気持ち・眠れない状態が重なっています。これは意志の問題ではありません。今日、産院・助産師・かかりつけ医に連絡してください。';}
  else if(zs>=3){zone='🟡 要注意ゾーン';zbg='#FAEEDA';zmsg='感情の波が大きくなっているサインです。まだ余裕があるうちに、パートナーや身近な人に今の状態を伝えてみてください。';}
  else{zone='🟢 正常範囲ゾーン';zbg='#E1F5EE';zmsg='疲れはあっても、今のところ自分を保てている状態です。下のタイプ別アドバイスを参考にセルフケアを続けてください。';}
  var sc={};
  Qs.slice(3).forEach(function(q,i){if(!sc[q.k])sc[q.k]=0;sc[q.k]+=(q.w[ans[i+3]]||0);});
  var srt=Object.entries(sc).sort(function(a,b){return b[1]-a[1];});
  var top=srt[0][0],sub=(srt[1]&&srt[1][1]>0)?srt[1][0]:null;
  document.getElementById('quiz').style.display='none';
  var ra=document.getElementById('result');ra.style.display='block';
  var h='<div class="res-zone" style="background:'+zbg+'"><div class="res-zone-title">'+zone+'</div><div class="res-zone-desc">'+zmsg+'</div></div>';
  if(rf||zs>=5) h+='<div class="alert-box">相談窓口：産院・助産師・かかりつけ医・産後ケアセンター<br>電話が難しい場合は、この画面をパートナーに見せてください。</div>';
  function tHTML(key,main){
    var t=TY[key];
    return '<div class="res-type"><span class="'+(main?'res-badge':'res-sub-badge')+'">'+(main?'あなたのタイプ':'サブタイプ')+'</span><div class="res-name">'+t.name+'</div><div class="res-core">'+t.core+'</div><div class="res-desc">'+t.desc+'</div><hr class="res-divider"><div class="al">避けたいこと</div>'+t.stop.map(function(s){return '<div class="a-stop">× '+s+'</div>';}).join('')+'<div class="al">やってみてほしいこと</div>'+t.go.map(function(s){return '<div class="a-go">+ '+s+'</div>';}).join('')+'</div>';
  }
  h+=tHTML(top,true);
  if(sub) h+=tHTML(sub,false);
  h+='<div style="background:#EEEDFE;border-radius:12px;padding:16px 20px;margin-top:16px;text-align:center"><p style="font-size:13px;color:#3C3489;line-height:1.7;margin-bottom:10px">タイプ別の詳しい対処法・パートナーへの伝え方は<br>noteの記事で読めます</p><a class="note-link" href="https://note.com/" target="_blank" style="display:inline-block;background:#534AB7;color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;text-decoration:none">note記事を読む</a></div>';
  h+='<button class="reset-btn" onclick="reset()">最初からやり直す</button>';
  ra.innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}
function reset(){
  ans=Array(Qs.length).fill(null);cur=0;
  document.getElementById('quiz').style.display='block';
  document.getElementById('result').style.display='none';
  render();
}
render();
</script>
</body>
</html>
